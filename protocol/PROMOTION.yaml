{
  "schema_version": 1,
  "terminal_outcomes": [
    "promote",
    "discard",
    "invalid",
    "needs_human_decision"
  ],
  "integrity_gates": {
    "require_schema_valid": true,
    "require_preflight_passed": true,
    "require_immutable_hashes_verified": true,
    "require_shim_checks_passed": true,
    "invalidating_sentinel_codes": [
      "undeclared_retrieval",
      "undeclared_helper_model",
      "undeclared_postprocessor",
      "trainable_parameter_mismatch",
      "observed_trainable_parameter_count_not_measured",
      "base_model_trainable_parameter_count_not_measured",
      "frozen_base_behavior_not_measured",
      "optimizer_param_membership_not_measured",
      "frozen_base_behavior_failed",
      "optimizer_includes_frozen_base_parameters",
      "missing_declared_capacity",
      "wrong_pack",
      "wrong_run_class",
      "command_mismatch",
      "immutable_drift"
    ]
  },
  "scientific_floors": {
    "end_of_sequence_avg_accuracy": {
      "family": "continual_learning",
      "metric": "end_of_sequence_avg_accuracy",
      "direction": "maximize",
      "rule": "not_worse_than_champion",
      "tolerance": 0.005,
      "borderline_tolerance": 0.01
    },
    "average_forgetting": {
      "family": "continual_learning",
      "metric": "average_forgetting",
      "direction": "minimize",
      "rule": "not_worse_than_champion",
      "tolerance": 0.01,
      "borderline_tolerance": 0.02
    }
  },
  "required_win_metrics": {
    "backward_transfer": {
      "family": "continual_learning",
      "metric": "backward_transfer",
      "direction": "maximize",
      "rule": "at_least_one_metric_improves",
      "min_improvement": 0.01,
      "borderline_tolerance": 0.005
    },
    "forward_transfer": {
      "family": "continual_learning",
      "metric": "forward_transfer",
      "direction": "maximize",
      "rule": "at_least_one_metric_improves",
      "min_improvement": 0.01,
      "borderline_tolerance": 0.005
    },
    "plasticity": {
      "family": "continual_learning",
      "metric": "plasticity",
      "direction": "maximize",
      "rule": "at_least_one_metric_improves",
      "min_improvement": 0.0005,
      "borderline_tolerance": 0.0001
    },
    "interference_shape": {
      "family": "continual_learning",
      "metric": "interference_shape",
      "direction": "minimize",
      "rule": "at_least_one_metric_improves",
      "min_improvement": 0.01,
      "borderline_tolerance": 0.005
    }
  },
  "min_required_improvements": 1,
  "cost_envelopes": {
    "runtime_seconds": {
      "family": "cost",
      "metric": "runtime_seconds",
      "max_relative_increase": 0.25,
      "borderline_relative_increase": 0.35
    },
    "peak_vram_gb": {
      "family": "cost",
      "metric": "peak_vram_gb",
      "max_relative_increase": 0.2,
      "borderline_relative_increase": 0.3
    }
  },
  "confirmation_policy": {
    "required_for_promotion": true,
    "missing_confirmation_outcome": "needs_human_decision",
    "failed_confirmation_outcome": "discard",
    "aggregate_status_values": {
      "pass": "pass",
      "fail": "fail",
      "pending": "pending"
    }
  },
  "confirmation_quality_gates": {
    "target_exact_min": 0.75,
    "anchor_exact_min": 0.4167,
    "joint_success_min": 0.5,
    "target_exact_delta_from_baseline_reference": 0.25,
    "anchor_exact_delta_from_baseline_reference": 0.25
  },
  "bootstrap_seed_gates": {
    "target_exact_min_abs": 0.35,
    "target_exact_delta_from_base": 0.25,
    "latest_value_probe_families": [
      "latest_state_after_repeated_overwrite",
      "counterfact_rewrite_paraphrase"
    ],
    "latest_value_exact_min": 0.4,
    "anchor_exact_min": 0.25,
    "visible_confirm_gap_max": 0.25
  },
  "baseline_acceptance_gates": {
    "default_tier": "provisional",
    "accepted_tier": "accepted",
    "confirmation_target_exact_min": 0.75,
    "latest_value_probe_families": [
      "latest_state_after_repeated_overwrite",
      "counterfact_rewrite_paraphrase"
    ],
    "latest_value_target_exact_min": 0.75,
    "anchor_exact_min": 0.4167,
    "neighbor_anchor_probe_families": [
      "neighbor_retention_same_namespace",
      "counterfact_neighborhood_specificity"
    ],
    "neighbor_anchor_exact_min": 0.5,
    "delayed_anchor_probe_families": [
      "delayed_retention_after_unrelated_updates",
      "counterfact_delayed_neighborhood_specificity"
    ],
    "delayed_anchor_exact_min": 0.25,
    "min_anchor_slice_exact_min": 0.25,
    "require_no_zero_anchor_slice": true
  },
  "borderline_replay_policy": {
    "enabled": true,
    "max_replays": 1,
    "trigger_state": "borderline_replay_eligible",
    "requirements": [
      "same_code",
      "same_spec_family",
      "approved_alternate_seed_only"
    ]
  },
  "human_escalation": {
    "outcome": "needs_human_decision",
    "reasons": [
      "meaningful_tradeoff_without_clear_rule",
      "missing_champion_context",
      "missing_confirmation_for_promising_candidate",
      "non_numeric_metric_family"
    ]
  }
}
